<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>衛星回收大行動</title>
    <!-- 引入 Tailwind CSS 進行快速 UI 排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 MediaPipe Hands 追蹤庫 -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'PingFang HK', 'Microsoft JhengHei', sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; object-fit: cover; }
        .glass-panel {
            background: rgba(10, 20, 40, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }
        /* 禁止選中文字，提升游戲體驗 */
        * { user-select: none; -webkit-user-select: none; }
    </style>
</head>
<body class="text-white">

    <!-- 游戲主畫布 (渲染攝像頭、手部座標、掉落的衛星) -->
    <canvas id="gameCanvas"></canvas>

    <!-- 隱藏的視頻元素，用於獲取攝像頭畫面 -->
    <video id="video" class="hidden" autoplay playsinline></video>

    <!-- UI 覆蓋層 -->
    <div id="ui-layer" class="absolute inset-0 z-10 pointer-events-none flex flex-col justify-center items-center">
        
        <!-- HUD (游戲進行中顯示的分數與時間) -->
        <div id="hud" class="absolute top-0 left-0 w-full p-6 flex justify-between items-start hidden">
            <div class="glass-panel px-6 py-3 rounded-xl text-2xl font-bold text-cyan-400">
                分數: <span id="hud-score" class="text-white">0</span>
            </div>
            <div class="glass-panel px-6 py-3 rounded-xl text-2xl font-bold text-yellow-400">
                時間: <span id="hud-time" class="text-white">60</span>s
            </div>
        </div>

        <!-- 問答 UI (已修改為螢幕正中央置中，並採用縮放動畫) -->
        <div id="triviaUI" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 glass-panel p-12 md:p-16 rounded-[2.5rem] flex-col items-center pointer-events-auto hidden transition-all duration-300 z-50 border-2 border-cyan-500 w-[95%] max-w-3xl opacity-0 scale-90">
            <div class="text-cyan-300 font-bold mb-4 text-lg md:text-2xl flex justify-between w-full">
                <span>🛰️ 衛星知識問答</span>
                <span class="text-yellow-400 animate-pulse">答對 +10分 (碰觸掉落選項作答)</span>
            </div>
            <p id="triviaQuestion" class="text-2xl md:text-4xl font-extrabold text-white mb-10 text-center leading-relaxed"></p>
            <!-- 移除了原本的按鈕區域 -->
            <!-- 問答回饋層 (已同步置中) -->
            <div id="triviaFeedback" class="absolute inset-0 flex justify-center items-center rounded-[2.5rem] bg-black bg-opacity-90 hidden backdrop-blur-sm z-10">
                <span id="triviaFeedbackText" class="text-4xl md:text-6xl font-extrabold"></span>
            </div>
        </div>

        <!-- 狀態 1: 載入中 -->
        <div id="loadingUI" class="glass-panel p-10 rounded-2xl flex flex-col items-center pointer-events-auto transition-opacity duration-500">
            <div class="w-16 h-16 border-4 border-cyan-400 border-t-transparent rounded-full animate-spin mb-6"></div>
            <h2 class="text-2xl font-bold text-cyan-100 tracking-wider">正在啟動相機與 AI 追蹤...</h2>
            <p class="text-gray-400 mt-2 text-sm">請允許瀏覽器使用相機權限</p>
        </div>

        <!-- 狀態 2: 主菜單 -->
        <div id="menuUI" class="glass-panel p-12 rounded-3xl flex flex-col items-center pointer-events-auto hidden scale-95 opacity-0 transition-all duration-500">
            <h1 class="text-5xl md:text-7xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600 mb-4 tracking-widest text-center">
                衛星回收大行動
            </h1>
            <p class="text-xl text-cyan-200 mb-8 max-w-md text-center leading-relaxed">
                移動您的手掌以捕捉掉落的衛星。<br>
                不同速度的衛星代表不同分數！<br>
                <span class="text-sm text-gray-400">請保持手掌在鏡頭範圍內</span>
            </p>
            <button onclick="startGame()" class="px-10 py-4 bg-cyan-500 hover:bg-cyan-400 text-black font-bold rounded-full text-2xl shadow-[0_0_20px_rgba(0,255,255,0.6)] hover:shadow-[0_0_30px_rgba(0,255,255,0.8)] transition-all transform hover:scale-105 active:scale-95">
                開始行動
            </button>
        </div>

        <!-- 狀態 3: 游戲結束 -->
        <div id="gameOverUI" class="glass-panel p-12 rounded-3xl flex flex-col items-center pointer-events-auto hidden scale-95 opacity-0 transition-all duration-500">
            <h2 class="text-4xl font-bold text-red-400 mb-2">時間到！</h2>
            <h1 class="text-6xl font-extrabold text-white mb-8">
                總分: <span id="finalScore" class="text-cyan-400 text-7xl">0</span>
            </h1>
            <button onclick="returnToMenu()" class="px-10 py-4 bg-gray-700 hover:bg-gray-600 text-white font-bold rounded-full text-xl shadow-lg hover:shadow-xl transition-all transform hover:scale-105 active:scale-95">
                返回主頁
            </button>
        </div>
    </div>

    <script>
        // --- 游戲核心變量 ---
        const GAME_DURATION = 60; // 游戲時長（秒）
        let gameState = 'LOADING'; // 狀態：LOADING, MENU, PLAYING, GAMEOVER
        let score = 0;
        let timeLeft = GAME_DURATION;
        let lastTime = 0;
        let spawnTimer = 0;
        let fallingObjects = []; // 存儲畫面中的掉落物
        let floatingTexts = []; // 存儲飄浮文字特效
        
        // --- 載入手部判定點回收圖片 ---
        const handImage = new Image();
        handImage.src = "./recycle.png";

        // --- 載入本地真實衛星圖片 ---
        const satelliteImages = {};
        
        // 精準對應您上傳的 5 張圖片檔案名稱
        const satImageUrls = {
            1: "./satellite_40932.png", // 速度 1: 最慢、最大
            2: "./satellite_40913.png", // 速度 2
            3: "./satellite_40917.png", // 速度 3
            4: "./satellite_40915.png", // 速度 4
            5: "./satellite_40929.png"  // 速度 5: 最快、最小
        };

        for (let level in satImageUrls) {
            let img = new Image();
            // 【修復關鍵】：移除了 img.crossOrigin = "anonymous" 設定
            // 這讓您在電腦上直接雙擊打開網頁 (file:// 協議) 時，能正常讀取同資料夾的圖片
            img.src = satImageUrls[level];
            satelliteImages[level] = img;
        }

        // 題庫 (15條)
        const triviaQuestions = [
            { q: "世界上第一顆人造衛星是由美國發射的。", a: false },
            { q: "北斗導航系統依賴於地球軌道上的衛星。", a: true },
            { q: "通信衛星通常運行在地球同步軌道上。", a: true },
            { q: "衛星可以完全不受地球引力的影響。", a: false },
            { q: "月球是地球的天然衛星。", a: true },
            { q: "哈勃太空望遠鏡也是一顆人造衛星。", a: true },
            { q: "所有人造衛星都運行在相同的高度。", a: false },
            { q: "氣象衛星可以用來預測颱風和天氣。", a: true },
            { q: "衛星掉入大氣層時通常會燃燒殆盡。", a: true },
            { q: "世界上最小的衛星大約有一輛汽車那麼大。", a: false },
            { q: "星鏈(Starlink)計畫旨在提供全球互聯網覆蓋。", a: true },
            { q: "人造衛星需要氧氣來維持運行。", a: false },
            { q: "中國的第一顆人造衛星叫東方紅一號。", a: true },
            { q: "離地球越近的衛星，其繞行速度通常越快。", a: true },
            { q: "衛星可以永遠留在太空中，永遠不會掉下來。", a: false }
        ];
        let availableQuestions = [];
        let currentTriviaAnswer = null;
        let activeTrivia = false; // 追蹤問答題是否進行中
        let last10sMark = Math.floor(GAME_DURATION / 10);

        // 追蹤手部中心座標（像素單位）
        let handPixelPos = null;

        // 獲取 DOM 元素
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('video');

        // 處理畫布響應式調整
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- 初始化 MediaPipe Hands ---
        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});
        hands.setOptions({
            maxNumHands: 1, // 為了流暢度與游戲性，只追蹤一隻手
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        // 處理 MediaPipe 傳回的結果
        hands.onResults((results) => {
            // 如果是首次成功獲取畫面，切換到主菜單
            if (gameState === 'LOADING') {
                gameState = 'MENU';
                hideUI('loadingUI');
                showUI('menuUI');
            }

            // 計算視頻覆蓋畫布的繪製參數 (模擬 CSS object-fit: cover)
            let drawWidth, drawHeight, offsetX, offsetY;
            if (video.videoWidth > 0 && video.videoHeight > 0) {
                const videoRatio = video.videoWidth / video.videoHeight;
                const canvasRatio = canvas.width / canvas.height;
                if (canvasRatio > videoRatio) {
                    drawWidth = canvas.width;
                    drawHeight = canvas.width / videoRatio;
                    offsetX = 0;
                    offsetY = (canvas.height - drawHeight) / 2;
                } else {
                    drawWidth = canvas.height * videoRatio;
                    drawHeight = canvas.height;
                    offsetX = (canvas.width - drawWidth) / 2;
                    offsetY = 0;
                }
            }

            // 更新手部座標
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0 && drawWidth) {
                const landmarks = results.multiHandLandmarks[0];
                // 使用第 9 號特徵點（中指根部）作為手掌中心
                const palm = landmarks[9]; 
                
                // 將 MediaPipe 的正規化座標轉換為 Canvas 的像素座標
                // 注意：因為畫面是水平鏡像反轉的，所以 X 軸需要特殊計算。
                // 並且依據需求【取消上下移動，固定在底部 85% 位置】。
                handPixelPos = {
                    x: canvas.width - (offsetX + (palm.x * drawWidth)),
                    y: canvas.height * 0.85
                };
            } else {
                handPixelPos = null;
            }
        });

        // --- 相機初始化 ---
        async function startCamera() {
            try {
                let stream;
                try {
                    // 嘗試獲取前置鏡頭（適用於大部分手機與平板）
                    stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'user', width: 640, height: 480 }
                    });
                } catch (e) {
                    console.warn('無法獲取前置鏡頭，嘗試獲取預設相機...', e);
                    // 退而求其次，獲取任何可用的相機 
                    stream = await navigator.mediaDevices.getUserMedia({
                        video: true
                    });
                }
                
                video.srcObject = stream;
                
                // 視頻準備就緒後，開始傳遞畫面給 AI 與啟動游戲循環
                video.onloadedmetadata = () => {
                    video.play();
                    processVideoToAI();
                    requestAnimationFrame(gameLoop);
                };
            } catch (err) {
                alert('無法存取相機！請確保您的裝置有連接相機，且已授權瀏覽器使用相機權限。');
                console.error('Camera Error:', err);
                const loadingElement = document.getElementById('loadingUI');
                if (loadingElement) {
                    loadingElement.innerHTML = `
                        <h2 class="text-2xl font-bold text-red-400 mb-2">找不到相機設備</h2>
                        <p class="text-gray-300 text-sm">請確認裝置已連接相機，並允許網頁存取權限。</p>
                    `;
                }
            }
        }

        // 將相機畫面送入 MediaPipe 進行辨識
        async function processVideoToAI() {
            if (video.readyState >= 2) {
                await hands.send({image: video});
            }
            requestAnimationFrame(processVideoToAI);
        }

        // --- 游戲邏輯 ---

        function showUI(id) {
            const el = document.getElementById(id);
            el.classList.remove('hidden');
            setTimeout(() => {
                el.classList.remove('opacity-0', 'scale-95');
                el.classList.add('opacity-100', 'scale-100');
            }, 50);
        }

        function hideUI(id) {
            const el = document.getElementById(id);
            el.classList.remove('opacity-100', 'scale-100');
            el.classList.add('opacity-0', 'scale-95');
            setTimeout(() => {
                el.classList.add('hidden');
            }, 500);
        }

        function startGame() {
            hideUI('menuUI');
            document.getElementById('hud').classList.remove('hidden');
            
            gameState = 'PLAYING';
            score = 0;
            timeLeft = GAME_DURATION;
            fallingObjects = [];
            floatingTexts = [];
            spawnTimer = 0;
            lastTime = performance.now();
            last10sMark = Math.floor(GAME_DURATION / 10);
            availableQuestions = [...triviaQuestions]; 
            activeTrivia = false;
            
            const triviaUI = document.getElementById('triviaUI');
            triviaUI.classList.remove('flex');
            triviaUI.classList.add('hidden', 'opacity-0', 'scale-90');
            
            updateHUD();
        }

        function endGame() {
            gameState = 'GAMEOVER';
            document.getElementById('hud').classList.add('hidden');
            const triviaUI = document.getElementById('triviaUI');
            triviaUI.classList.remove('flex');
            triviaUI.classList.add('hidden');
            
            document.getElementById('finalScore').innerText = score;
            showUI('gameOverUI');
        }

        function returnToMenu() {
            hideUI('gameOverUI');
            fallingObjects = []; 
            floatingTexts = [];
            activeTrivia = false;
            showUI('menuUI');
            gameState = 'MENU';
        }

        function updateHUD() {
            document.getElementById('hud-score').innerText = score;
            document.getElementById('hud-time').innerText = Math.ceil(timeLeft);
            
            if (timeLeft <= 10) {
                document.getElementById('hud-time').parentElement.classList.replace('text-yellow-400', 'text-red-500');
            } else {
                document.getElementById('hud-time').parentElement.classList.replace('text-red-500', 'text-yellow-400');
            }
        }

        function getLevelConfig(level) {
            // 速度越快 (級別越高)，面積越小 (sizeMult 越小)
            const configs = {
                1: { dropTime: 8,  color: 'rgba(156, 163, 175, 0.6)', sizeMult: 2, emoji: '🛰️' }, 
                2: { dropTime: 6,   color: 'rgba(74, 222, 128, 0.6)',  sizeMult: 1.75, emoji: '🛰️' },
                3: { dropTime: 5,   color: 'rgba(96, 165, 250, 0.6)',  sizeMult: 1.5, emoji: '🛰️' },
                4: { dropTime: 4, color: 'rgba(192, 132, 252, 0.6)', sizeMult: 1.2, emoji: '🛰️' },
                5: { dropTime: 2,   color: 'rgba(248, 113, 113, 0.8)', sizeMult: 1, emoji: '🛰️' }  
            };
            return configs[level];
        }

        const obstacleConfigs = [
            { dropTime: 5, color: 'rgba(255, 100, 50, 0.6)', sizeMult: 1.3, emoji: '🪨', penalty: 5 }, 
            { dropTime: 4, color: 'rgba(150, 150, 150, 0.6)', sizeMult: 1.5, emoji: '✈️', penalty: 5 }  
        ];

        function spawnObject() {
            // 20% 機率生成不可觸碰的障礙物
            if (Math.random() < 0.2) {
                const obsConfig = obstacleConfigs[Math.floor(Math.random() * obstacleConfigs.length)];
                fallingObjects.push({
                    type: 'obstacle',
                    x: Math.random() * 0.8 + 0.1,
                    y: -0.1,
                    speedY: 1.0 / obsConfig.dropTime,
                    sizeMult: obsConfig.sizeMult,
                    color: obsConfig.color,
                    emoji: obsConfig.emoji,
                    penalty: obsConfig.penalty
                });
                return;
            }

            let level;
            // 規則：前 40 秒只掉落 1-3 級。後 40 秒加入更快的。
            if (timeLeft > 40) {
                level = Math.floor(Math.random() * 3) + 1;
            } else {
                level = Math.floor(Math.random() * 5) + 1;
            }

            const config = getLevelConfig(level);
            const speedY = 1.0 / config.dropTime;

            fallingObjects.push({
                type: 'satellite',
                x: Math.random() * 0.8 + 0.1,
                y: -0.1,
                level: level,
                score: level,
                speedY: speedY,
                sizeMult: config.sizeMult, // 此數值將被用於圖片自動縮放
                color: config.color,
                emoji: config.emoji
            });
        }

        // --- 處理問答邏輯 ---
        function showTrivia() {
            if (availableQuestions.length === 0) return;
            
            const randomIndex = Math.floor(Math.random() * availableQuestions.length);
            const qObj = availableQuestions.splice(randomIndex, 1)[0];
            
            currentTriviaAnswer = qObj.a;
            activeTrivia = true;
            
            document.getElementById('triviaQuestion').innerText = qObj.q;
            document.getElementById('triviaFeedback').classList.add('hidden');
            
            const triviaUI = document.getElementById('triviaUI');
            triviaUI.classList.remove('hidden');
            triviaUI.classList.add('flex');
            
            setTimeout(() => {
                triviaUI.classList.remove('opacity-0', 'scale-90');
                triviaUI.classList.add('opacity-100', 'scale-100');
            }, 50);

            const config = getLevelConfig(1);
            const speedY = 1.0 / config.dropTime;
            const answerSizeMult = 4; 

            fallingObjects.push({
                type: 'trivia_answer',
                x: 0.25, 
                y: -0.1,
                answerValue: true,
                speedY: speedY,
                sizeMult: answerSizeMult,
                color: 'rgba(74, 222, 128, 0.8)',
                emoji: '⭕',
                text: '是'
            });

            fallingObjects.push({
                type: 'trivia_answer',
                x: 0.75, 
                y: -0.1,
                answerValue: false,
                speedY: speedY,
                sizeMult: answerSizeMult,
                color: 'rgba(248, 113, 113, 0.8)',
                emoji: '❌',
                text: '否'
            });
        }

        function answerTrivia(userAnswer) {
            activeTrivia = false;
            
            const feedbackEl = document.getElementById('triviaFeedback');
            const feedbackText = document.getElementById('triviaFeedbackText');
            
            feedbackEl.classList.remove('hidden');
            
            if (userAnswer === currentTriviaAnswer) {
                score += 10;
                feedbackText.innerText = "答對了！ +10 分";
                feedbackText.className = "text-4xl md:text-6xl font-bold text-green-400 drop-shadow-[0_0_10px_rgba(74,222,128,0.8)]";
                updateHUD();
            } else {
                feedbackText.innerText = "答錯了！ 不扣分";
                feedbackText.className = "text-4xl md:text-6xl font-bold text-red-400 drop-shadow-[0_0_10px_rgba(248,113,113,0.8)]";
            }
            
            setTimeout(() => {
                const triviaUI = document.getElementById('triviaUI');
                triviaUI.classList.remove('opacity-100', 'scale-100');
                triviaUI.classList.add('opacity-0', 'scale-90');
                setTimeout(() => {
                    triviaUI.classList.remove('flex');
                    triviaUI.classList.add('hidden');
                }, 300);
            }, 1500);
        }

        function addFloatingText(text, x, y, color) {
            floatingTexts.push({
                text: text,
                x: x,
                y: y,
                color: color,
                life: 1.0, 
                speedY: -0.1 
            });
        }

        function updateGame(deltaTime) {
            const dtSec = deltaTime / 1000;

            timeLeft -= dtSec;
            if (timeLeft <= 0) {
                timeLeft = 0;
                updateHUD();
                endGame();
                return;
            }

            updateHUD();

            const current10sMark = Math.floor(timeLeft / 10);
            if (current10sMark < last10sMark && current10sMark > 0) {
                last10sMark = current10sMark;
                showTrivia();
            }

            spawnTimer -= dtSec;
            if (spawnTimer <= 0) {
                spawnObject();
                spawnTimer = 0.8 + Math.random() * 0.7; 
            }

            const baseRadius = Math.min(canvas.width, canvas.height) * 0.05;
            const handRadius = Math.min(canvas.width, canvas.height) * 0.12;

            // 確保手部坐標始終鎖定在畫面底部的 85% 位置
            if (handPixelPos) {
                handPixelPos.y = canvas.height * 0.85;
            }

            for (let i = fallingObjects.length - 1; i >= 0; i--) {
                let obj = fallingObjects[i];
                obj.y += obj.speedY * dtSec;

                const objPixelX = obj.x * canvas.width;
                const objPixelY = obj.y * canvas.height;
                const objActualRadius = baseRadius * obj.sizeMult;

                if (handPixelPos) {
                    const dist = Math.hypot(objPixelX - handPixelPos.x, objPixelY - handPixelPos.y);
                    
                    if (dist < handRadius * 0.6 + objActualRadius) {
                        if (obj.type === 'satellite') {
                            score += obj.score;
                            addFloatingText(`+${obj.score}`, objPixelX, objPixelY, 'rgba(74, 222, 128, 1)'); 
                            fallingObjects.splice(i, 1);
                            updateHUD();
                            continue;
                        } else if (obj.type === 'obstacle') {
                            score -= obj.penalty;
                            if (score < 0) score = 0; 
                            addFloatingText(`-${obj.penalty}`, objPixelX, objPixelY, 'rgba(248, 113, 113, 1)'); 
                            fallingObjects.splice(i, 1);
                            updateHUD();
                            continue;
                        } else if (obj.type === 'trivia_answer') {
                            answerTrivia(obj.answerValue);
                            fallingObjects.splice(i, 1);
                            continue;
                        }
                    }
                }

                if (obj.y > 1.1) {
                    fallingObjects.splice(i, 1);
                }
            }

            if (!activeTrivia) {
                for (let i = fallingObjects.length - 1; i >= 0; i--) {
                    if (fallingObjects[i].type === 'trivia_answer') {
                        fallingObjects.splice(i, 1);
                    }
                }
            }

            const hasAnswersLeft = fallingObjects.some(o => o.type === 'trivia_answer');
            if (!hasAnswersLeft && activeTrivia) {
                activeTrivia = false;
                const triviaUI = document.getElementById('triviaUI');
                triviaUI.classList.remove('opacity-100', 'scale-100');
                triviaUI.classList.add('opacity-0', 'scale-90');
                setTimeout(() => {
                    triviaUI.classList.remove('flex');
                    triviaUI.classList.add('hidden');
                }, 300);
            }

            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                floatingTexts[i].life -= dtSec;
                floatingTexts[i].y += floatingTexts[i].speedY * canvas.height * dtSec;
                if (floatingTexts[i].life <= 0) {
                    floatingTexts.splice(i, 1);
                }
            }
        }

        // --- 繪製畫布 ---
        function draw(deltaTime) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (video.videoWidth > 0 && video.videoHeight > 0) {
                const videoRatio = video.videoWidth / video.videoHeight;
                const canvasRatio = canvas.width / canvas.height;
                let drawWidth, drawHeight, offsetX, offsetY;

                if (canvasRatio > videoRatio) {
                    drawWidth = canvas.width;
                    drawHeight = canvas.width / videoRatio;
                    offsetX = 0;
                    offsetY = (canvas.height - drawHeight) / 2;
                } else {
                    drawWidth = canvas.height * videoRatio;
                    drawHeight = canvas.height;
                    offsetX = (canvas.width - drawWidth) / 2;
                    offsetY = 0;
                }

                ctx.save();
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(video, offsetX, offsetY, drawWidth, drawHeight);
                ctx.restore();
            }

            ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if ((gameState === 'PLAYING' || gameState === 'MENU') && handPixelPos) {
                // 確保繪製時手部坐標鎖定在畫面底部的 85% 位置
                handPixelPos.y = canvas.height * 0.85;

                const hx = handPixelPos.x;
                const hy = handPixelPos.y;
                const radius = Math.min(canvas.width, canvas.height) * 0.12;

                // 畫光暈圈
                ctx.beginPath();
                ctx.arc(hx, hy, radius, 0, 2 * Math.PI);
                ctx.fillStyle = gameState === 'PLAYING' ? 'rgba(0, 255, 200, 0.2)' : 'rgba(255, 255, 255, 0.1)';
                ctx.fill();
                ctx.lineWidth = 3;
                ctx.strokeStyle = gameState === 'PLAYING' ? 'rgba(0, 255, 200, 0.8)' : 'rgba(255, 255, 255, 0.5)';
                ctx.stroke();

                // 繪製上傳的 recycle.png 作為判定點
                if (handImage.complete && handImage.naturalWidth > 0) {
                    const imgSize = radius * 1.4; // 配合光圈的大小調整圖片尺寸
                    ctx.drawImage(handImage, hx - imgSize / 2, hy - imgSize / 2, imgSize, imgSize);
                } else {
                    // 若圖片載入中或載入失敗，採用 ✋ 備用
                    ctx.font = `${radius * 0.8}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('✋', hx, hy);
                }
            }

            if (gameState === 'PLAYING') {
                const baseRadius = Math.min(canvas.width, canvas.height) * 0.05; 

                fallingObjects.forEach(obj => {
                    const sx = obj.x * canvas.width;
                    const sy = obj.y * canvas.height;
                    const currentRadius = baseRadius * obj.sizeMult; // 此屬性完美繼承了前版的面積比例

                    // 畫發光背景圈與外框
                    ctx.beginPath();
                    if (obj.type === 'obstacle') {
                        // 扣分物件：遺失物、太空垃圾之菱形尖刺的外框
                        const spikes = 12; 
                        const outerRadius = currentRadius * 1.3; 
                        const innerRadius = currentRadius * 0.8; 
                        
                        for (let k = 0; k < spikes * 2; k++) {
                            const radius = k % 2 === 0 ? outerRadius : innerRadius;
                            const angle = (k * Math.PI) / spikes;
                            const px = sx + Math.cos(angle) * radius;
                            const py = sy + Math.sin(angle) * radius;
                            if (k === 0) {
                                ctx.moveTo(px, py);
                            } else {
                                ctx.lineTo(px, py);
                            }
                        }
                        ctx.closePath();
                    } else {
                        // 一般物件（衛星圖片護盾、問答選項）：繪製平滑圓形
                        ctx.arc(sx, sy, currentRadius, 0, 2 * Math.PI);
                    }
                    
                    // 針對衛星，我們將原本的顏色護盾大幅調淡，以確保真實的 PNG 圖片能夠清楚凸顯出來
                    if (obj.type === 'satellite') {
                        ctx.fillStyle = obj.color.replace('0.6', '0.15').replace('0.8', '0.2');
                    } else {
                        ctx.fillStyle = obj.color;
                    }
                    ctx.fill();
                    
                    ctx.lineWidth = obj.type === 'obstacle' ? 3 : 2;
                    if (obj.type === 'obstacle') {
                        ctx.strokeStyle = 'rgba(255, 100, 100, 0.8)';
                    } else if (obj.type === 'satellite') {
                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                    } else {
                        ctx.strokeStyle = 'white';
                    }
                    ctx.stroke();

                    // 圖標、圖片與文字渲染
                    if (obj.type === 'trivia_answer') {
                        ctx.font = `${currentRadius * 0.8}px Arial`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(obj.emoji, sx, sy - currentRadius * 0.2);

                        ctx.font = `bold ${currentRadius * 0.6}px Arial`;
                        ctx.fillStyle = 'white';
                        ctx.fillText(obj.text, sx, sy + currentRadius * 0.4);

                    } else if (obj.type === 'obstacle') {
                        ctx.font = `${currentRadius * 1.2}px Arial`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(obj.emoji, sx, sy);

                    } else if (obj.type === 'satellite') {
                        
                        // ===== 真實 PNG 圖片渲染核心 =====
                        const img = satelliteImages[obj.level];
                        
                        // 確保圖片已成功載入且可用
                        if (img && img.complete && img.naturalWidth > 0) {
                            // 【等比例縮放修正】：計算圖片原始寬高比
                            const ratio = img.naturalWidth / img.naturalHeight;
                            let dw, dh;
                            const maxDim = currentRadius * 2.8; // 基準最大邊長

                            if (img.naturalWidth > img.naturalHeight) {
                                // 寬圖：寬度設為最大，高度等比縮小
                                dw = maxDim;
                                dh = maxDim / ratio;
                            } else {
                                // 長圖：高度設為最大，寬度等比縮小
                                dw = maxDim * ratio;
                                dh = maxDim;
                            }
                            
                            ctx.drawImage(img, sx - dw / 2, sy - dh / 2, dw, dh);
                        } else {
                            // 圖片載入失敗時的 Emoji 備案
                            ctx.font = `${currentRadius * 1.2}px Arial`;
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'middle';
                            ctx.fillText(obj.emoji || '🛰️', sx, sy);
                        }

                        // 畫出分數提示 (往上推開以免遮住圖片)
                        ctx.font = `bold ${currentRadius * 0.5}px Arial`;
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                        ctx.fillText(`${obj.score}分`, sx, sy - currentRadius * 1.6);
                    }
                });

                floatingTexts.forEach(ft => {
                    ctx.save();
                    ctx.globalAlpha = Math.max(0, ft.life); 
                    ctx.font = `bold ${baseRadius}px Arial`;
                    ctx.fillStyle = ft.color;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.shadowColor = "black";
                    ctx.shadowBlur = 4;
                    ctx.fillText(ft.text, ft.x, ft.y);
                    ctx.restore();
                });
            }
        }

        // --- 主循環 ---
        function gameLoop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;

            if (gameState === 'PLAYING') {
                updateGame(deltaTime);
            }
            
            draw(deltaTime);

            requestAnimationFrame(gameLoop);
        }

        startCamera();

    </script>
</body>
</html>
